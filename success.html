<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Message Sent — Wandering Wolf Copywriting</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
    <script defer src="https://cdn.vercel-insights.com/v1/script.js"></script>
    <style>
        :root { --bg-deep: #1a1f2e; --bg-card: #252b3d; --accent: #d4a04a; --text-primary: #f5f2eb; --text-secondary: #9ba1b0; }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'DM Sans', sans-serif; background: var(--bg-deep); color: var(--text-primary); min-height: 100vh; display: flex; align-items: center; justify-content: center; line-height: 1.6; }
        body::before { content: ''; position: fixed; top: 0; left: 0; width: 100%; height: 100%; opacity: 0.03; pointer-events: none; background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)'/%3E%3C/svg%3E"); }
        .container { max-width: 400px; padding: 48px 24px; text-align: center; animation: fadeIn 0.6s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        .success-icon { width: 80px; height: 80px; margin: 0 auto 24px; background: rgba(212, 160, 74, 0.15); border-radius: 50%; display: flex; align-items: center; justify-content: center; }
        .success-icon svg { width: 40px; height: 40px; color: var(--accent); }
        .success-title { font-family: 'Fraunces', serif; font-size: 1.75rem; margin-bottom: 12px; }
        .success-text { color: var(--text-secondary); font-size: 1rem; margin-bottom: 32px; }
        .back-btn { display: inline-block; padding: 14px 32px; background: var(--bg-card); border: 1px solid rgba(255,255,255,0.1); border-radius: 10px; color: var(--text-primary); text-decoration: none; font-weight: 600; transition: all 0.2s ease; }
        .back-btn:hover { background: #2d3448; border-color: rgba(212, 160, 74, 0.3); transform: translateY(-2px); }
    </style>
</head>
<body>
    <div class="container">
        <div class="success-icon">
            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                <path stroke-linecap="round" stroke-linejoin="round" d="M5 13l4 4L19 7"/>
            </svg>
        </div>
        <h1 class="success-title">Message Received! 🐺</h1>
        <p class="success-text">Thanks for reaching out. I'll get back to you within 24-48 hours.</p>
        <a href="index.html" class="back-btn">← Back to Home</a>
    </div>
</body>
</html>
